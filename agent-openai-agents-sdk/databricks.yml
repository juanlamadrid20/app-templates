bundle:
  name: agent_openai_agents_sdk

variables:
  app_name:
    description: "Base name of the Databricks app"
    default: "agent-openai-agents-sdk"

sync:
  exclude:
    - .git
    - .venv
    - .databricks
    - .claude
    - __pycache__
    - "*.pyc"
    - .DS_Store
    - .env
    - node_modules

resources:

  experiments:
    agent_openai_agents_sdk_experiment:
      name: /Users/${workspace.current_user.userName}/${bundle.name}-${bundle.target}

  apps:
    agent_openai_agents_sdk:
      name: "${var.app_name}"
      description: "OpenAI Agents SDK agent application"
      source_code_path: ./
      config:
        command: ["uv", "run", "start-app"]
        env:
          - name: MLFLOW_TRACKING_URI
            value: "databricks"
          - name: MLFLOW_REGISTRY_URI
            value: "databricks-uc"
          - name: API_PROXY
            value: "http://localhost:8000/invocations"
          - name: CHAT_APP_PORT
            value: "3000"
          - name: CHAT_PROXY_TIMEOUT_SECONDS
            value: "300"
          - name: MLFLOW_EXPERIMENT_ID
            value_from: "experiment"

      resources:
        - name: 'experiment'
          experiment:
            experiment_id: ""
            permission: 'CAN_MANAGE'
        - name: 'customer_reviews_vector_index'
          uc_securable:
            securable_full_name: 'juan_use1_catalog.retail.gold_customer_reviews_idx'
            securable_type: 'TABLE'
            permission: 'SELECT'

targets:

  fevm:
    mode: development
    default: true
    workspace:
      host: https://fevm-juan-use1.cloud.databricks.com
    presets:
      source_linked_deployment: true

  prod:
    mode: production
    run_as:
      # TODO: replace with your production service principal
      service_principal_name: "<service-principal-name>"
